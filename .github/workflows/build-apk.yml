name: Build SAT APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      buildType:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options: ['debug', 'release']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.1.0 platform-tools'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate keystore (for Release)
        if: inputs.buildType == 'release'
        run: |
          keytool -genkey -v -keystore sat-release.jks -alias sat -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=SAT, OU=SAT, O=SAT, L=Beijing, ST=Beijing, C=CN"

      - name: Create keystore.properties (for Release)
        if: inputs.buildType == 'release'
        run: |
          cat > android/keystore.properties << 'EOF'
          storeFile=../sat-release.jks
          storePassword=android
          keyAlias=sat
          keyPassword=android
          EOF

      - name: Build APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          if [ "${{ inputs.buildType }}" = "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Set APK path
        id: apk
        run: |
          if [ "${{ inputs.buildType }}" = "release" ]; then
            echo "path=android/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "name=SAT-release.apk" >> $GITHUB_OUTPUT
          else
            echo "path=android/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
            echo "name=SAT-debug.apk" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAT-APK-${{ inputs.buildType }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90

      - name: Upload keystore artifact (Release only)
        if: inputs.buildType == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: SAT-keystore
          path: sat-release.jks
          retention-days: 90
